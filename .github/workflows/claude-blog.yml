name: Claude Blog Operations

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, edited]

jobs:
  claude-blog:
    if: contains(github.event.comment.body, '@claude') || (github.event_name == 'issues' && (contains(github.event.issue.title, 'Blog post:') || contains(github.event.issue.title, 'Edit blog:') || contains(github.event.issue.title, 'Remove from blog:')))
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Claude Blog Operations
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: "https://openrouter.ai/api"
          ANTHROPIC_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEV_IO_API_TOKEN: ${{ secrets.DEV_IO_API_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          claude_args: |
            --max-turns 15
            --model anthropic/claude-sonnet-4.6
            --system-prompt "You are a specialized blogger agent. Analyze the issue context to determine if this is a blog creation, editing, or content removal task. Use the blogging skills and follow the project guidelines in CLAUDE.md."